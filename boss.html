<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade OS / Boss Deck</title>
    <style>
        :root { --bg-dark: #09090b; --card-bg: #18181b; --border-color: #27272a; --text-main: #f4f4f5; --text-muted: #a1a1aa; --primary: #6366f1; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --epic: #a855f7; }
        body.corporate { --bg-dark: #f1f5f9; --card-bg: #ffffff; --border-color: #cbd5e1; --text-main: #0f172a; --text-muted: #64748b; --primary: #2563eb; --success: #059669; --warning: #d97706; --danger: #e11d48; --epic: #7e22ce; }
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: var(--bg-dark); color: var(--text-main); max-width: 900px; margin: 0 auto; padding: 20px; padding-bottom: 150px; transition: background-color 0.3s, color 0.3s; }
        
        .system-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        .header-buttons { display: flex; gap: 10px; }
        
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        @media (max-width: 600px) { .dashboard-grid { grid-template-columns: 1fr; } }
        
        .card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card-title { margin-top: 0; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        input[type="text"], input[type="datetime-local"], select, textarea { width: 100%; background: var(--bg-dark); border: 1px solid var(--border-color); color: var(--text-main); padding: 12px; border-radius: 8px; box-sizing: border-box; margin-bottom: 15px; font-family: inherit; outline: none; }
        textarea { resize: vertical; min-height: 80px; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.3s; width: 100%; }
        .btn-theme { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); font-size: 0.8rem; padding: 5px 10px; border-radius: 6px; cursor: pointer; }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); padding: 5px 15px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; text-decoration: none; display: inline-block; }
        .btn-success { background: var(--success); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        
        .task-card { background: var(--bg-dark); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .task-info { display: flex; flex-direction: column; gap: 5px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; display: inline-block; }
        .badge-owner { background: rgba(99, 102, 241, 0.15); color: var(--primary); border: 1px solid var(--primary); }
        
        /* AI Chat Styles */
        #companion-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; align-items: flex-end; z-index: 1000; }
        .speech-bubble { background: var(--text-main); color: var(--bg-dark); font-weight: bold; font-size: 0.85rem; padding: 10px 15px; border-radius: 12px; border-bottom-right-radius: 2px; margin-bottom: 10px; max-width: 200px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.15); opacity: 0; transform: translateY(10px); transition: all 0.3s ease; }
        .speech-bubble.active { opacity: 1; transform: translateY(0); }
        .mascot-sprite { font-size: 3rem; line-height: 1; transition: all 0.3s; cursor: pointer; }
        body:not(.corporate) .mascot-sprite { animation: floatMascot 3s ease-in-out infinite; filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.6)); }
        @keyframes floatMascot { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-10px) scale(1.05); } }
        
        #ai-chat-panel { display: none; position: fixed; bottom: 90px; right: 20px; width: 320px; background: var(--card-bg); border: 1px solid var(--primary); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; overflow: hidden; transition: all 0.3s; }
    </style>
</head>
<body>
    <div class="system-header">
        <h1 style="margin: 0; font-size: 1.5rem;">👑 BOSS DECK</h1>
        <div class="header-buttons">
            <button class="btn-theme" id="btn-theme" onclick="toggleTheme()">👔 Corporate Mode</button>
            <button class="btn-theme" onclick="clearData()">📊 Data</button>
            <a href="index.html" class="btn-outline">View Terminal</a>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="card" style="border-color: var(--epic);">
            <h3 class="card-title" style="color: var(--text-main);">🚀 Deploy New Project</h3>
            <input type="text" id="task-title" placeholder="Project Title: What needs to be done?">
            <textarea id="task-summary" placeholder="Boss Instructions: Paste detailed context or emails here..."></textarea>
            <div style="display: flex; gap: 10px;">
                <select id="task-type"><option>One-Off</option><option>Recurring</option></select>
                <select id="task-priority"><option>Normal</option><option>High</option><option>Critical</option></select>
            </div>
            <input type="text" id="task-assignee" placeholder="Assignee ID (e.g., pranaav, dev team)">
            <button class="btn" onclick="deployTask()">Deploy to Server</button>
        </div>
        
        <div class="card" style="border-color: var(--success);">
            <h3 class="card-title" style="color: var(--success);">🗓️ Master Schedule</h3>
            <input type="text" id="event-title" placeholder="Event description...">
            <input type="datetime-local" id="event-datetime">
            <button class="btn-success" onclick="addEvent()">Add to Global Calendar</button>
        </div>
    </div>

    <div class="card">
        <h3 class="card-title">📡 Global Task Monitor</h3>
        <div id="global-tasks">No active tasks in database.</div>
    </div>

    <!-- AGENTIC AI CO-WORKER CHAT PANEL -->
    <div id="ai-chat-panel">
        <div style="background: var(--primary); color: white; padding: 10px 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center;">
            <span>🧠 Boss-Level AI Agent</span>
            <button onclick="toggleAIChat()" style="background: transparent; border: none; color: white; cursor: pointer; font-weight: bold;">✕</button>
        </div>
        <div id="chat-history" style="height: 250px; overflow-y: auto; padding: 15px; font-size: 0.85rem; color: var(--text-main); display: flex; flex-direction: column; gap: 10px;">
            <div style="background: var(--bg-dark); padding: 10px; border-radius: 8px; border-left: 3px solid var(--epic);">Boss Terminal recognized. I can now deploy tasks and schedule events for your team if you ask me to!</div>
        </div>
        <div style="padding: 10px; border-top: 1px solid var(--border-color); display: flex; gap: 8px;">
            <input type="text" id="chat-input" placeholder="Give me a command..." style="margin: 0; flex-grow: 1; padding: 8px; font-size: 0.85rem;" onkeypress="if(event.key === 'Enter') sendChatMessage()">
            <button class="btn" style="width: auto; padding: 8px 12px;" onclick="sendChatMessage()">Send</button>
        </div>
    </div>

    <!-- MASCOT -->
    <div id="companion-container">
        <div class="speech-bubble" id="slime-speech">Awaiting orders, Boss!</div>
        <div class="mascot-sprite" id="mascot" onclick="toggleAIChat()">💧</div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('hc_tasks')) || [];
        let agenda = JSON.parse(localStorage.getItem('hc_agenda')) || [];
        let isCorporate = localStorage.getItem('hc_theme') === 'corporate';
        
        window.onload = function() { applyTheme(); renderGlobalTasks(); };

        function toggleTheme() { isCorporate = !isCorporate; localStorage.setItem('hc_theme', isCorporate ? 'corporate' : 'arcade'); applyTheme(); }
        function applyTheme() {
            if (isCorporate) {
                document.body.classList.add('corporate'); document.getElementById('btn-theme').innerText = "👾 Arcade Mode";
                document.getElementById('mascot').innerText = "🤖";
            } else {
                document.body.classList.remove('corporate'); document.getElementById('btn-theme').innerText = "👔 Corporate Mode";
                document.getElementById('mascot').innerText = "💧";
            }
        }
        
        function clearData() { if(confirm("Wipe all system data?")) { localStorage.clear(); location.reload(); } }

        function deployTask(autoTitle, autoAssignee, autoSummary) {
            const title = autoTitle || document.getElementById('task-title').value.trim();
            const assignee = autoAssignee || document.getElementById('task-assignee').value.trim();
            const summary = autoSummary || document.getElementById('task-summary').value.trim();
            
            if(!title || !assignee) { alert("Title and Assignee required."); return; }
            
            const newTask = { id: 'task_' + Date.now(), title, assignee, summary, completed: false, created: new Date().toISOString() };
            tasks.push(newTask); localStorage.setItem('hc_tasks', JSON.stringify(tasks));
            
            document.getElementById('task-title').value = ''; document.getElementById('task-assignee').value = ''; document.getElementById('task-summary').value = '';
            renderGlobalTasks(); slimeSpeak("Task deployed to server.");
        }

        function addEvent(autoTitle, autoDatetime) {
            const title = autoTitle || document.getElementById('event-title').value.trim();
            const datetime = autoDatetime || document.getElementById('event-datetime').value;
            
            if(!title || !datetime) { alert("Description and Date/Time required."); return; }
            
            agenda.push({ id: 'evt_' + Date.now(), title, datetime });
            localStorage.setItem('hc_agenda', JSON.stringify(agenda));
            
            document.getElementById('event-title').value = ''; document.getElementById('event-datetime').value = '';
            slimeSpeak("Event added to Global Calendar.");
        }

        function renderGlobalTasks() {
            const container = document.getElementById('global-tasks'); container.innerHTML = '';
            if(tasks.length === 0) { container.innerHTML = 'No active tasks in database.'; return; }
            
            tasks.forEach(t => {
                const status = t.completed ? '<span style="color:var(--success);">Complete</span>' : '<span style="color:var(--warning);">Pending</span>';
                container.insertAdjacentHTML('afterbegin', `
                    <div class="task-card">
                        <div class="task-info">
                            <strong>${t.title}</strong>
                            <span class="badge badge-owner">👤 ${t.assignee}</span>
                        </div>
                        <div>${status}</div>
                    </div>
                `);
            });
        }

        function toggleAIChat() {
            const panel = document.getElementById('ai-chat-panel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            if(panel.style.display === 'block') slimeSpeak("Ready to assign tasks.");
        }

        let speechTimeout;
        function slimeSpeak(text) {
            const bubble = document.getElementById('slime-speech'); bubble.innerText = text; bubble.classList.add('active');
            clearTimeout(speechTimeout); speechTimeout = setTimeout(() => { bubble.classList.remove('active'); }, 4000);
        }

        async function sendChatMessage() {
            const inputEl = document.getElementById('chat-input');
            const msg = inputEl.value.trim();
            if(!msg) return;
            
            const history = document.getElementById('chat-history');
            history.innerHTML += `<div style="background: rgba(99,102,241,0.1); padding: 8px; border-radius: 8px; align-self: flex-end;"><strong>You:</strong> ${msg}</div>`;
            inputEl.value = ''; history.scrollTop = history.scrollHeight;
            
            const apiKey = localStorage.getItem('hc_apikey');
            if(!apiKey) {
                history.innerHTML += `<div style="background: rgba(239,68,68,0.1); padding: 8px; border-radius: 8px; color: var(--danger);"><strong>Error:</strong> API Key missing. Login as an Employee via the Terminal first, paste your key in Settings, and then come back.</div>`;
                return;
            }
            
            const activeTasks = tasks.filter(t => !t.completed).map(t => t.title + " (Assigned to: " + t.assignee + ")").join(", ");
            const prompt = `You are a boss-level AI assistant. The current active tasks across the company are: [${activeTasks}]. The boss says: "${msg}". Reply briefly. If the boss asks you to assign a task or schedule a meeting, use the provided tools.`;
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: prompt }] }],
                        tools: [{
                            functionDeclarations: [
                                {
                                    name: "deploy_task",
                                    description: "Deploy a new task to an employee.",
                                    parameters: { 
                                        type: "OBJECT", 
                                        properties: { 
                                            title: { type: "STRING", description: "The title of the task." },
                                            assignee: { type: "STRING", description: "The name of the employee to assign this to (e.g., john, dev team)." },
                                            summary: { type: "STRING", description: "Optional detailed instructions." }
                                        }, 
                                        required: ["title", "assignee"] 
                                    }
                                },
                                {
                                    name: "schedule_event",
                                    description: "Add an event to the global calendar.",
                                    parameters: { 
                                        type: "OBJECT", 
                                        properties: { 
                                            title: { type: "STRING", description: "The name of the event or meeting." },
                                            datetime: { type: "STRING", description: "The date and time in YYYY-MM-DDTHH:MM format (e.g., 2026-07-05T14:30)." }
                                        }, 
                                        required: ["title", "datetime"] 
                                    }
                                }
                            ]
                        }]
                    })
                });
                
                const data = await response.json();
                if(data.error) throw new Error(data.error.message);

                const part = data.candidates[0].content.parts[0];
                
                if (part.functionCall) {
                    const funcName = part.functionCall.name;
                    const args = part.functionCall.args;
                    let actionMsg = "";
                    
                    if (funcName === "deploy_task") {
                        deployTask(args.title, args.assignee, args.summary || "");
                        actionMsg = `🚀 Task '${args.title}' deployed to ${args.assignee}.`;
                    } else if (funcName === "schedule_event") {
                        addEvent(args.title, args.datetime);
                        actionMsg = `🗓️ Event '${args.title}' added to calendar for ${args.datetime}.`;
                    }

                    history.innerHTML += `<div style="background: var(--bg-dark); padding: 10px; border-radius: 8px; border-left: 3px solid var(--success); color: var(--success);"><strong>System:</strong> ${actionMsg}</div>`;
                } else {
                    let reply = part.text.trim();
                    history.innerHTML += `<div style="background: var(--bg-dark); padding: 10px; border-radius: 8px; border-left: 3px solid var(--primary);"><strong>AI:</strong> ${reply}</div>`;
                }
                
                history.scrollTop = history.scrollHeight;
            } catch (e) {
                console.error("AI Error:", e);
                history.innerHTML += `<div style="background: rgba(239,68,68,0.1); color:var(--danger); padding: 10px; border-radius: 8px; font-size: 0.8rem;"><strong>System Error:</strong> ${e.message}</div>`;
                history.scrollTop = history.scrollHeight;
            }
        }
    </script>
</body>
</html>
