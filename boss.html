<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade OS / Boss Command Deck</title>
    <style>
        :root { --bg-dark: #09090b; --card-bg: #18181b; --border-color: #27272a; --text-main: #f4f4f5; --text-muted: #a1a1aa; --primary: #6366f1; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; }
        body.corporate { --bg-dark: #f1f5f9; --card-bg: #ffffff; --border-color: #cbd5e1; --text-main: #0f172a; --text-muted: #64748b; --primary: #2563eb; --success: #059669; --warning: #d97706; --danger: #e11d48; }
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: var(--bg-dark); color: var(--text-main); max-width: 900px; margin: 0 auto; padding: 20px; transition: background-color 0.3s, color 0.3s; }
        .system-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        @media (max-width: 700px) { .dashboard-grid { grid-template-columns: 1fr; } }
        .control-panel { background: var(--card-bg); border: 1px solid var(--primary); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.1); transition: all 0.3s; }
        body.corporate .control-panel { box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input, select, textarea { background: var(--bg-dark); border: 1px solid var(--border-color); color: var(--text-main); padding: 12px; border-radius: 8px; box-sizing: border-box; width: 100%; margin-bottom: 10px; font-family: inherit; transition: all 0.3s; }
        textarea { resize: vertical; min-height: 80px; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.3s; width: 100%; }
        .btn-theme { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); margin-right: 10px; font-size: 0.8rem; width: auto;}
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 5px 10px; border-radius: 6px; cursor: pointer; transition: all 0.3s; }
        .btn-danger:hover { background: rgba(225, 29, 72, 0.1); }
        .task-list { background: var(--card-bg); border: 1px solid var(--border-color); padding: 20px; border-radius: 12px; max-height: 500px; overflow-y: auto; transition: all 0.3s; }
        .task-item { border-bottom: 1px solid var(--border-color); padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; background: rgba(99, 102, 241, 0.15); color: var(--primary); border: 1px solid var(--primary); margin-right: 10px; }
        
        #companion-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; align-items: flex-end; z-index: 1000; }
        .speech-bubble { background: var(--text-main); color: var(--bg-dark); font-weight: bold; font-size: 0.85rem; padding: 10px 15px; border-radius: 12px; border-bottom-right-radius: 2px; margin-bottom: 10px; max-width: 200px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.15); opacity: 0; transform: translateY(10px); transition: all 0.3s ease; }
        .speech-bubble.active { opacity: 1; transform: translateY(0); }
        .mascot-sprite { font-size: 3rem; line-height: 1; transition: all 0.3s; cursor: pointer; }
        body:not(.corporate) .mascot-sprite { animation: floatMascot 3s ease-in-out infinite; filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.6)); }
        @keyframes floatMascot { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-10px) scale(1.05); } }
    </style>
</head>
<body>
    <div class="system-header">
        <h1 id="app-title" style="margin: 0; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px;">👑 Boss Deck</h1>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-theme" id="btn-theme" onclick="toggleTheme()">👔 Corporate Mode</button>
            <button class="btn" style="width: auto; background: transparent; border: 1px solid var(--border-color);" onclick="window.location.href='analytics.html'">📊 Data</button>
            <button class="btn" style="width: auto; background: transparent; border: 1px solid var(--primary);" onclick="window.location.href='index.html'">View Terminal</button>
        </div>
    </div>

    <div class="dashboard-grid">
        <!-- TASK DEPLOYMENT ENGINE -->
        <div class="control-panel">
            <h3 style="margin-top:0;">🚀 Deploy New Project</h3>
            <input type="text" id="quest-title" placeholder="Project Title: What needs to be done?">
            <textarea id="quest-summary" placeholder="Boss Instructions: Paste detailed context or emails here..."></textarea>
            
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <select id="quest-type" style="flex-grow: 1;">
                    <option value="quest">Type: One-Off</option>
                    <option value="habit">Type: Daily Habit</option>
                </select>
                <select id="quest-priority" style="flex-grow: 1;">
                    <option value="p2">Priority: Normal</option>
                    <option value="p1">Priority: Critical</option>
                    <option value="p3">Priority: Low</option>
                </select>
            </div>
            <input type="text" id="quest-assignee" placeholder="Assignee ID (e.g., pranaav, dev team)">
            
            <button class="btn" onclick="addQuest()">Deploy to Server</button>
        </div>

        <!-- MASTER SCHEDULE ENGINE -->
        <div class="control-panel" style="border-color: var(--success);">
            <h3 style="margin-top:0; color: var(--success);">🗓️ Master Schedule</h3>
            <div id="agenda-container" style="max-height: 200px; overflow-y: auto; margin-bottom: 15px; border: 1px solid var(--border-color); padding: 10px; border-radius: 8px;"></div>
            
            <input type="text" id="agenda-input-title" placeholder="Event description...">
            <input type="datetime-local" id="agenda-input-datetime">
            <button class="btn" style="background: var(--success);" onclick="addAgendaItem()">Add to Global Calendar</button>
        </div>
    </div>

    <!-- GLOBAL TASK MONITOR -->
    <div class="task-list">
        <h3 style="margin-top:0;">📡 Global Task Monitor</h3>
        <div id="global-tasks"></div>
    </div>

    <div id="companion-container">
        <div class="speech-bubble" id="slime-speech">Boss Mode Online!</div>
        <div class="mascot-sprite" id="mascot" onclick="pokeSlime()">💧</div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('hc_tasks')) || [];
        let agenda = JSON.parse(localStorage.getItem('hc_agenda')) || [];
        let isCorporate = localStorage.getItem('hc_theme') === 'corporate';

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSFX(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'success') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            } else if (type === 'danger') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        window.onload = function() {
            applyTheme();
            renderAgenda();
            renderGlobalTasks();
            setTimeout(() => slimeSpeak("Awaiting deployment orders."), 1000);
        };

        function toggleTheme() { isCorporate = !isCorporate; localStorage.setItem('hc_theme', isCorporate ? 'corporate' : 'arcade'); applyTheme(); }
        function applyTheme() {
            if (isCorporate) {
                document.body.classList.add('corporate'); 
                document.getElementById('btn-theme').innerText = "👾 Arcade Mode";
                document.getElementById('app-title').innerText = "👔 Management Deck";
                document.getElementById('mascot').innerText = "🤖"; 
            } else {
                document.body.classList.remove('corporate'); 
                document.getElementById('btn-theme').innerText = "👔 Corporate Mode";
                document.getElementById('app-title').innerText = "👑 Boss Deck";
                document.getElementById('mascot').innerText = "💧"; 
            }
        }

        let speechTimeout;
        function slimeSpeak(text) {
            const bubble = document.getElementById('slime-speech'); bubble.innerText = text; bubble.classList.add('active');
            clearTimeout(speechTimeout); speechTimeout = setTimeout(() => { bubble.classList.remove('active'); }, 4000);
        }
        function pokeSlime() { slimeSpeak(isCorporate ? "Management systems active." : "Send out those quests, Boss!"); }

        function addQuest() {
            const title = document.getElementById('quest-title').value.trim();
            const summary = document.getElementById('quest-summary').value.trim();
            const type = document.getElementById('quest-type').value;
            const priority = document.getElementById('quest-priority').value;
            const assignee = document.getElementById('quest-assignee').value.trim() || 'Dev Team'; 

            if (!title) return alert("Task requires a title.");

            tasks.push({
                id: Math.random().toString(36).substr(2, 9),
                title: title,
                summary: summary,
                assignee: assignee,
                priority: priority,
                type: type,
                timestamp: Date.now(),
                completed: false,
                subQuests: []
            });

            localStorage.setItem('hc_tasks', JSON.stringify(tasks));
            
            document.getElementById('quest-title').value = '';
            document.getElementById('quest-summary').value = '';
            document.getElementById('quest-assignee').value = '';
            
            renderGlobalTasks();
            playSFX('success');
            slimeSpeak(`Deployed to ${assignee}!`);
        }

        function renderGlobalTasks() {
            const container = document.getElementById('global-tasks');
            container.innerHTML = '';
            if(tasks.length === 0) return container.innerHTML = '<div style="color:var(--text-muted);">No active tasks in database.</div>';

            tasks.forEach(task => {
                const status = task.completed ? '<span style="color:var(--success);">[COMPLETED]</span>' : '<span style="color:var(--warning);">[PENDING]</span>';
                container.innerHTML += `
                    <div class="task-item">
                        <div>
                            <span class="badge">👤 ${task.assignee}</span>
                            <strong>${task.title}</strong> ${status}
                        </div>
                        <button class="btn-danger" onclick="deleteQuest('${task.id}')">Delete</button>
                    </div>
                `;
            });
        }

        function deleteQuest(id) {
            if(confirm("Permanently delete this task from the database?")) {
                tasks = tasks.filter(t => t.id !== id);
                localStorage.setItem('hc_tasks', JSON.stringify(tasks));
                playSFX('danger');
                renderGlobalTasks();
            }
        }

        function renderAgenda() {
            const container = document.getElementById('agenda-container');
            container.innerHTML = '';
            agenda = agenda.filter(e => e && e.datetime);
            localStorage.setItem('hc_agenda', JSON.stringify(agenda));

            agenda.sort((a, b) => new Date(a.datetime) - new Date(b.datetime));
            
            agenda.forEach((event, index) => {
                const d = new Date(event.datetime);
                const dtStr = `${d.toLocaleDateString()} ${d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
                container.innerHTML += `
                    <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:0.85rem;">
                        <span>${event.title} <span style="color:var(--text-muted);">(${dtStr})</span></span>
                        <span style="color:var(--danger); cursor:pointer;" onclick="deleteAgendaItem(${index})">✕</span>
                    </div>
                `;
            });
        }

        function addAgendaItem() {
            const title = document.getElementById('agenda-input-title').value.trim();
            const datetime = document.getElementById('agenda-input-datetime').value;
            if (!title || !datetime) return alert("Missing schedule data.");
            
            agenda.push({ title: title, datetime: datetime });
            localStorage.setItem('hc_agenda', JSON.stringify(agenda));
            
            document.getElementById('agenda-input-title').value = '';
            document.getElementById('agenda-input-datetime').value = '';
            playSFX('success');
            renderAgenda();
            slimeSpeak("Calendar updated.");
        }

        function deleteAgendaItem(index) {
            agenda.splice(index, 1);
            localStorage.setItem('hc_agenda', JSON.stringify(agenda));
            playSFX('danger');
            renderAgenda();
        }
    </script>
</body>
</html>
