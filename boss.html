<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade OS / Boss Deck</title>
    <style>
        /* --- CLEAN MODERN AESTHETIC --- */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        :root {
            --bg-dark: #0f172a;       
            --card-bg: #1e293b;       
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #38bdf8;       
            --success: #34d399;
            --danger: #f87171;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 20px; 
            padding-bottom: 150px; 
            background-image: none; 
        }

        h1, h2, h3, .card-title { font-family: 'Inter', sans-serif; font-weight: 800; letter-spacing: -0.5px; margin-top: 0; }
        
        .system-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        .header-buttons { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        @media (max-width: 600px) { .dashboard-grid { grid-template-columns: 1fr; } }
        
        .card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 25px; border-radius: 16px; box-shadow: var(--shadow); transition: transform 0.2s ease; }
        .card:hover { transform: translateY(-3px); }
        
        input[type="text"], input[type="password"], input[type="datetime-local"], select, textarea { width: 100%; background: var(--bg-dark); border: 1px solid var(--border-color); color: var(--text-main); padding: 12px; border-radius: 10px; box-sizing: border-box; margin-bottom: 15px; font-family: inherit; outline: none; transition: border-color 0.2s; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); }
        textarea { resize: vertical; min-height: 80px; }
        
        .btn { background: var(--primary); color: #0f172a; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.2s ease; width: 100%; font-size: 1rem; }
        .btn:hover { background: #7dd3fc; transform: scale(1.02); }
        .btn-success { background: var(--success); color: #0f172a; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; width: 100%; transition: all 0.2s ease; }
        .btn-success:hover { background: #6ee7b7; transform: scale(1.02); }
        
        .btn-theme, .btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); font-size: 0.85rem; padding: 6px 12px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .btn-theme:hover, .btn-outline:hover { background: var(--border-color); }
        
        .task-card { background: var(--bg-dark); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .task-info { display: flex; flex-direction: column; gap: 5px; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; display: inline-block; }
        .badge-owner { background: rgba(56, 189, 248, 0.15); color: var(--primary); border: 1px solid var(--primary); }

        /* --- THE ROAMING SLIME CONTAINER --- */
        #companion-container { 
            position: fixed; 
            top: 80vh; 
            left: 80vw; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            z-index: 9999; 
            transition: top 3s ease-in-out, left 3s ease-in-out; 
            pointer-events: none; 
        }
        
        .mascot-sprite { pointer-events: auto; transition: transform 0.3s; cursor: pointer; filter: drop-shadow(0 10px 15px rgba(56, 189, 248, 0.4)); }
        
        .speech-bubble { 
            background: white; 
            color: #0f172a; 
            font-family: 'Inter', sans-serif;
            font-weight: bold; 
            font-size: 0.85rem; 
            padding: 12px 18px; 
            border-radius: 20px; 
            border-bottom-right-radius: 4px; 
            margin-bottom: 10px; 
            max-width: 200px; 
            text-align: center; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2); 
            opacity: 0; 
            transform: translateY(10px); 
            transition: all 0.3s ease; 
            pointer-events: none; 
        }
        .speech-bubble.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <!-- SYSTEM HEADER -->
    <div class="system-header">
        <h1 style="margin: 0; font-size: 1.5rem;">👑 BOSS DECK</h1>
        <div class="header-buttons">
            <button class="btn-theme" id="btn-theme" onclick="toggleTheme()">👔 Corporate Mode</button>
            <button class="btn-theme" onclick="clearData()">🗑️ Data</button>
            <button class="btn-theme">⚙️ Settings</button>
            <a href="index.html" class="btn-outline">View Terminal</a>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div class="dashboard-grid">
        <!-- DEPLOY NEW PROJECT -->
        <div class="card">
            <h3 class="card-title">🚀 DEPLOY NEW PROJECT</h3>
            <input type="text" id="task-title" placeholder="Project Title: What needs to be done?">
            <textarea id="task-context" placeholder="Boss Instructions: Paste detailed context or emails here..."></textarea>
            
            <div style="display: flex; gap: 10px;">
                <select id="task-type">
                    <option value="One-Off">One-Off</option>
                    <option value="Recurring">Recurring</option>
                </select>
                <select id="task-priority">
                    <option value="Normal">Normal</option>
                    <option value="Critical">Critical</option>
                </select>
            </div>
            
            <input type="text" id="task-assignee" placeholder="Assignee ID (e.g., pranaav, dev team)">
            <button class="btn" onclick="deployProject()">Deploy to Server</button>
        </div>

        <!-- MASTER SCHEDULE -->
        <div class="card">
            <h3 class="card-title" style="color: var(--success);">📅 MASTER SCHEDULE</h3>
            <input type="text" id="agenda-title" placeholder="Event description...">
            <input type="datetime-local" id="agenda-time">
            <button class="btn-success" onclick="addToSchedule()">Add to Global Calendar</button>
        </div>
    </div>

    <!-- TASK MONITOR -->
    <div class="card" style="margin-bottom: 40px;">
        <h3 class="card-title">📡 GLOBAL TASK MONITOR</h3>
        <div id="monitor-container">
            <!-- Tasks render here -->
        </div>
    </div>

    <!-- SLIME COMPANION -->
    <div id="companion-container">
        <div class="speech-bubble" id="slime-speech">Awaiting orders, Boss!</div>
        <div class="mascot-sprite" id="mascot" style="width: 70px; height: 70px;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
                <defs>
                    <linearGradient id="slimeBlue" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#38bdf8"/>
                        <stop offset="100%" stop-color="#1d4ed8"/>
                    </linearGradient>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                        <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>
                <g filter="url(#glow)">
                    <path d="M 75 20 C 73 10 87 10 85 20 L 82 32 L 78 32 Z" fill="#facc15"/>
                    <circle cx="80" cy="38" r="3" fill="#facc15"/>
                </g>
                <path d="M 10 80 C 5 80 5 65 15 50 C 25 35 40 25 50 25 C 60 25 75 35 85 50 C 95 65 95 80 90 80 Z" fill="url(#slimeBlue)"/>
                <ellipse cx="35" cy="55" rx="4" ry="10" fill="#0f172a"/>
                <ellipse cx="65" cy="55" rx="4" ry="10" fill="#0f172a"/>
                <circle cx="34" cy="50" r="1.5" fill="white"/>
                <circle cx="64" cy="50" r="1.5" fill="white"/>
                <ellipse cx="75" cy="35" rx="8" ry="4" fill="white" opacity="0.3" transform="rotate(-25 75 35)"/>
            </svg>
        </div>
    </div>

    <!-- ENGINE (JAVASCRIPT) -->
    <script>
        // --- DATA LAYER ---
        let tasks = JSON.parse(localStorage.getItem('hc_tasks')) || [];
        let isCorporate = localStorage.getItem('hc_theme') === 'corporate';

        // --- CORE FUNCTIONS ---
        function applyTheme() {
            if (isCorporate) {
                document.body.classList.add('corporate'); 
                document.getElementById('btn-theme').innerText = "👾 Arcade Mode";
            } else {
                document.body.classList.remove('corporate'); 
                document.getElementById('btn-theme').innerText = "👔 Corporate Mode";
            }
        }

        function toggleTheme() {
            isCorporate = !isCorporate;
            localStorage.setItem('hc_theme', isCorporate ? 'corporate' : 'arcade');
            applyTheme();
        }

        function renderTasks() {
            const container = document.getElementById('monitor-container');
            container.innerHTML = '';
            
            if (tasks.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted); font-size: 0.9em;">No active tasks. Systems idle.</p>';
                return;
            }

            tasks.forEach(task => {
                if(task.status === 'completed' || task.completed) return; 
                
                const borderColor = task.priority === 'Critical' ? 'var(--danger)' : 'var(--primary)';
                const priorityColor = task.priority === 'Critical' ? 'var(--danger)' : '#facc15';

                container.innerHTML += `
                    <div class="task-card" style="border-left: 4px solid ${borderColor}">
                        <div class="task-info">
                            <div style="color: white; font-weight: 600;">${task.title}</div>
                            <div style="display: flex; gap: 8px; margin-top: 5px;">
                                <span class="badge badge-owner">👤 ${task.assignee || 'UNASSIGNED'}</span>
                                <span class="badge" style="color: #0f172a; background: ${priorityColor}">⚡ ${task.priority || 'NORMAL'}</span>
                            </div>
                        </div>
                        <div style="color: var(--warning); font-size: 0.85em; font-weight: bold;">Pending</div>
                    </div>
                `;
            });
        }

        function deployProject() {
            const title = document.getElementById('task-title').value;
            if(!title) return alert("Task needs a title!");
            
            const newTask = {
                id: Date.now(),
                title: title,
                priority: document.getElementById('task-priority').value,
                assignee: document.getElementById('task-assignee').value,
                status: 'pending'
            };
            
            tasks.unshift(newTask);
            localStorage.setItem('hc_tasks', JSON.stringify(tasks));
            renderTasks();
            
            document.getElementById('task-title').value = '';
            document.getElementById('task-assignee').value = '';
        }

        function clearData() {
            if(confirm("Wipe all system data?")) {
                localStorage.removeItem('hc_tasks');
                tasks = [];
                renderTasks();
            }
        }

        // --- VIRTUAL PET SLIME BRAIN (JAILBREAK FIX) ---
        const slimeContainer = document.getElementById('companion-container');
        const mascotEl = document.getElementById('mascot');
        
        // Force the CSS to release its grip on the bottom corner!
        slimeContainer.style.bottom = 'auto';
        slimeContainer.style.right = 'auto';
        
        function roamSlime() {
            const maxX = window.innerWidth - 120;
            const maxY = window.innerHeight - 150;
            
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY) + 20;

            const currentX = parseInt(slimeContainer.style.left || window.innerWidth - 100);
            if (randomX < currentX) {
                mascotEl.style.transform = "scaleX(1)"; 
            } else {
                mascotEl.style.transform = "scaleX(-1)"; 
            }

            slimeContainer.style.left = randomX + 'px';
            slimeContainer.style.top = randomY + 'px';
            
            if (Math.random() > 0.6) {
                setTimeout(giveTaskReminder, 3100); 
            }

            const nextMove = Math.floor(Math.random() * 6000) + 4000;
            setTimeout(roamSlime, nextMove);
        }

        function giveTaskReminder() {
            const pendingTasks = tasks.filter(t => t.status !== 'completed' && !t.completed);
            const speechBubble = document.getElementById('slime-speech');
            
            if (pendingTasks.length > 0) {
                const randomTask = pendingTasks[Math.floor(Math.random() * pendingTasks.length)];
                
                if(randomTask.priority === 'Critical') {
                    speechBubble.innerText = "🚨 BOSS! Don't forget: " + randomTask.title;
                } else {
                    speechBubble.innerText = "Just reminding you about: " + randomTask.title;
                }
            } else {
                speechBubble.innerText = "All tasks complete, Boss! ✨";
            }
            
            speechBubble.classList.add('active');
            setTimeout(() => speechBubble.classList.remove('active'), 4000);
        }

        // --- SYSTEM BOOT SEQUENCE ---
        window.onload = function() {
            applyTheme();
            renderTasks();
            // Wake up slime 2 seconds after boot
            setTimeout(roamSlime, 2000);
        };
    </script>
</body>
</html>
